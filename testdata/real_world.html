    <!-- Main content area -->

             data-api-url="/api/v2/dashboard/stats"
             data-refresh-url="/api/v2/dashboard/refresh"
             data-export-url="/api/v2/dashboard/export"
             data-ws-url="wss://realtime.example.com/ws/dashboard"
             data-config='{"apiBase":"/api/v2","wsBase":"wss://realtime.example.com"}'
             data-endpoints='["/api/v2/users","/api/v2/posts","/api/v2/analytics"]'>
            <h2>Dashboard Overview</h2>
        </div>

        <section class="user-panel"
                 data-user-api="/api/v2/users/current"
                 data-upload-url="/api/v2/upload"

                                https://cdn.example.com/images/banner-xl@2x.webp 2400w"
                        type="image/webp">
                <source media="(min-width: 768px)"
                        srcset="https://cdn.example.com/images/banner-md.webp 768w,
                                https://cdn.example.com/images/banner-md@2x.webp 1536w"
                        type="image/webp">
                <source srcset="https://cdn.example.com/images/banner-sm.webp 375w"
                        type="image/webp">
                <img src="https://cdn.example.com/images/banner-fallback.jpg"
                     srcset="https://cdn.example.com/images/banner-sm.jpg 375w,
                             https://cdn.example.com/images/banner-md.jpg 768w,
                             https://cdn.example.com/images/banner-lg.jpg 1200w"

        </section>

        <!-- Forms with action URLs -->
        <section class="forms">
            <form id="login-form" action="/auth/login" method="POST">
                <input type="hidden" name="csrf_token" value="">
                <input type="email" name="email" placeholder="Email">
                <input type="password" name="password" placeholder="Password">
                <button type="submit">Login</button>
            </form>

            <form id="search-form" action="/api/v2/search" method="GET">
                <input type="text" name="q" placeholder="Search...">
                <button type="submit">Search</button>
            </form>

            <form id="upload-form" action="/api/v2/upload" method="POST"
                  enctype="multipart/form-data">
                <input type="file" name="file" accept=".pdf,.doc,.docx">
                <button type="submit">Upload</button>
            </form>

            <form id="settings-form" action="/api/v2/users/current/settings" method="PUT">
                <input type="text" name="display_name" value="">
                <select name="language">
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                </select>
                <button type="submit">Save</button>
            </form>

            <!-- Hidden form with interesting action -->
            <form id="admin-action" action="/api/admin/execute-command" method="POST" style="display:none">
                <input type="hidden" name="action" value="reset">
            </form>

    <!-- Inline scripts with various URL patterns -->
    <script>
        // -----------------------------------------------
        // Service Worker Registration
        // -----------------------------------------------
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js', { scope: '/' })
                .then(function(registration) {
                    console.log('SW registered:', registration.scope);
                    // Check for updates every 60 seconds
                    setInterval(function() {
                        registration.update();
                    }, 60000);
                })
                .catch(function(error) {
                    // Fallback: report to error tracking
                    fetch('/api/v1/errors/sw-registration', {
                        method: 'POST',
                        body: JSON.stringify({ error: error.message })
                    });
                });
        }
    </script>

    <script>
        // -----------------------------------------------
        // WebSocket Connections
        // -----------------------------------------------
        (function() {
            // Primary notification WebSocket
            var wsNotify = new WebSocket('wss://realtime.example.com/ws/notifications');
            wsNotify.onmessage = function(event) {
                var data = JSON.parse(event.data);
                if (data.type === 'alert') {
                    showNotification(data.message);
                }
            };
            wsNotify.onerror = function() {
                // Fallback to polling
                setInterval(function() {
                    fetch('/api/v2/notifications/poll')
                        .then(function(r) { return r.json(); })
                        .then(function(d) { processNotifications(d); });
                }, 5000);
            };

            // Presence/live status WebSocket
            var wsPresence = new WebSocket('wss://realtime.example.com/ws/presence');
            wsPresence.onopen = function() {
                wsPresence.send(JSON.stringify({
                    type: 'subscribe',
                    channels: ['user-status', 'team-activity']
                }));
            };

            // Admin-only monitoring WebSocket
            if (window.__IS_ADMIN__) {
                var wsAdmin = new WebSocket('wss://admin-realtime.example.com/ws/monitoring');
                wsAdmin.onmessage = function(event) {
                    updateAdminDashboard(JSON.parse(event.data));
                };
            }

            // Chat WebSocket with reconnection
            var wsChat = new WebSocket('wss://chat.example.com/ws/rooms/general');
            wsChat.onclose = function() {
                setTimeout(function() {
                    wsChat = new WebSocket('wss://chat.example.com/ws/rooms/general');
                }, 3000);
            };
        })();
    </script>

    <script>
        // -----------------------------------------------
        // localStorage / sessionStorage URL reads
        // -----------------------------------------------
        (function() {
            // Store API configuration
            localStorage.setItem('api_base', 'https://api.example.com/v2');
            localStorage.setItem('cdn_base', 'https://cdn.example.com');
            localStorage.setItem('ws_url', 'wss://realtime.example.com/ws');
            localStorage.setItem('auth_endpoint', '/auth/oauth/authorize');
            localStorage.setItem('graphql_url', 'https://api.example.com/graphql');
            localStorage.setItem('upload_url', '/api/v2/upload/direct');

            // Read configuration
            var apiBase = localStorage.getItem('api_base');
            var cdnBase = localStorage.getItem('cdn_base');
            fetch(apiBase + '/health');

            // Session storage for temporary data
            sessionStorage.setItem('return_url', '/dashboard/analytics');
            sessionStorage.setItem('checkout_api', 'https://payments.example.com/v1/checkout');
            sessionStorage.setItem('sso_callback', '/auth/sso/callback?provider=okta');

            var returnUrl = sessionStorage.getItem('return_url');
        })();
    </script>

    <script>
        // -----------------------------------------------
        // postMessage with target origin
        // -----------------------------------------------
        (function() {
            // Send message to parent frame
            if (window.parent !== window) {
                window.parent.postMessage(
                    { type: 'ready', url: '/api/v2/widget/status' },
                    'https://parent.example.com'
                );
            }

            // Send message to specific iframe
            var iframe = document.getElementById('payment-iframe');
            if (iframe) {
                iframe.contentWindow.postMessage(
                    { action: 'init', config: { api: '/api/v2/payment/config' } },
                    'https://payments.example.com'
                );
            }

            // Listen for messages from trusted origins
            window.addEventListener('message', function(event) {
                var trustedOrigins = [
                    'https://parent.example.com',
                    'https://payments.example.com',
                    'https://widget.example.com',
                    'https://auth.example.com'
                ];
                if (trustedOrigins.indexOf(event.origin) === -1) return;

                if (event.data.type === 'navigate') {
                    window.location.href = event.data.url;
                }
                if (event.data.type === 'api-call') {
                    fetch(event.data.endpoint);
                }
            });

            // Cross-origin opener communication
            if (window.opener) {
                window.opener.postMessage(
                    { type: 'oauth-complete', token: 'xxx' },
                    'https://app.example.com'
                );
            }
        })();
    </script>

        // Initialize analytics
        fetch('https://api.example.com/v2/analytics/init', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                page: window.location.pathname,
                referrer: document.referrer,
                timestamp: Date.now()
            })
        });

        // CSRF token fetch
        fetch('/api/v2/csrf-token', { credentials: 'include' })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                document.querySelector('meta[name="csrf-token"]').content = data.token;
            });

        // Prefetch critical API data
        var prefetchUrls = [
            '/api/v2/users/current',
            '/api/v2/notifications/unread',
            '/api/v2/feature-flags',
            '/api/v2/settings/current'
        ];
        prefetchUrls.forEach(function(url) {
            fetch(url, { credentials: 'include' });
        });

        // Dynamic import
        if (document.querySelector('.chart-container')) {
            import('/assets/js/charts.module.js').then(function(module) {
                module.initCharts('/api/v2/analytics/chart-data');
            });
        }
